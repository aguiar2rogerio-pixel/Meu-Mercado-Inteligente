<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#121212">
    <title>Lista de Compras Inteligente</title>
    
    <link rel="manifest" href="manifest.json">
    
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #4caf50;
            --text-color: #e0e0e0;
            --text-secondary: #b0b0b0;
            --border-color: #333;
            --danger-color: #cf6679;
            --accent-color: #03dac6;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-y: auto; /* Permite a rolagem natural no celular */
        }

        header {
            padding: 16px;
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .input-group {
            position: relative;
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        input[type="text"] {
            flex: 1;
            background-color: #2c2c2c;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            color: var(--text-color);
            font-size: 16px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        .btn-add {
            background-color: var(--primary-color);
            border: none;
            border-radius: 8px;
            width: 48px;
            height: 48px;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 56px;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 0 0 8px 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 20;
            display: none;
        }

        .suggestion-item {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }

        main {
            padding: 16px;
            padding-bottom: 240px; /* Espaço gigante no fim para a rolagem passar livre pelos botões fixos */
        }

        section {
            margin-bottom: 24px;
        }

        h2 {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .list-item {
            background-color: var(--surface-color);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: opacity 0.3s;
        }

        .list-item.checked {
            opacity: 1;
            border: 1px solid rgba(129, 199, 132, 0.3);
        }

        .list-item.checked .item-name {
            text-decoration: line-through;
            color: #81c784;
            font-size: 1.1rem;
        }

        .list-item.checked .item-details {
            color: #a5d6a7;
        }

        .checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid var(--primary-color);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .checkbox.checked::after {
            content: '✓';
            color: var(--primary-color);
            font-weight: bold;
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-weight: 500;
            display: block;
        }

        .item-details {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .item-actions {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 4px;
            cursor: pointer;
        }

        .month-pills {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 12px;
            margin-bottom: 12px;
            -webkit-overflow-scrolling: touch;
        }

        .pill {
            background-color: #2c2c2c;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 0.9rem;
            white-space: nowrap;
            cursor: pointer;
            display: inline-block;
        }

        .pill.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            font-weight: bold;
        }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: var(--surface-color);
            border-top: 1px solid var(--border-color);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
        }

        .totals {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }

        .total-item span {
            display: block;
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        .total-item b {
            font-size: 1.1rem;
            color: var(--primary-color);
        }

        .btn-finish {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .modal {
            background-color: var(--surface-color);
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
        }

        .form-row {
            margin-bottom: 16px;
        }

        .form-row label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .modal input, .modal select {
            background-color: #2c2c2c;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            color: var(--text-color);
            font-size: 16px;
            width: 100%;
        }

        .modal-btns {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-cancel {
            flex: 1;
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-save {
            flex: 2;
            background-color: var(--primary-color);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 8px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
            cursor: pointer;
        }

        .monthly-summary {
            background-color: #2c2c2c;
            padding: 14px;
            border-radius: 8px;
            margin-top: 12px;
            margin-bottom: 12px;
        }

        .backup-controls {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            margin-bottom: 16px; 
        }

        .cta-retorno-container {
            margin-top: 24px;
            margin-bottom: 16px;
            width: 100%;
        }

        .cta-retorno-link {
            display: block;
            background: linear-gradient(135deg, #1e1e1e 0%, #252525 100%);
            border: 1px dashed var(--primary-color);
            border-left: 4px solid var(--primary-color);
            color: #ffffff;
            text-decoration: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .history-preview-list {
            max-height: 240px;
            overflow-y: auto;
            margin-bottom: 16px;
        }

        .history-preview-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #333;
            font-size: 0.9rem;
        }

        #installApp {
            cursor: pointer;
            background: none;
            border: none;
            color: var(--primary-color);
            font-size: 1.3rem;
            padding: 4px 8px;
        }
    </style>
</head>
<body>

<header>
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <div style="width: 32px;"></div> <!-- Equilíbrio estético -->
        <h1>Lista de Compras</h1>
        <button id="installApp" style="display: none;">📥</button>
    </div>
    <div class="input-group">
        <input type="text" id="itemInput" placeholder="Adicionar item (ex: Leite)" autocomplete="off">
        <button class="btn-add" id="btnAdd">+</button>
        <div class="suggestions" id="suggestions"></div>
    </div>
</header>

<main>
    <section id="section-todo">
        <h2 style="display: flex; justify-content: space-between;">
            <span>Para Comprar</span>
            <span id="count-todo" style="font-size: 0.75rem; background: #333; padding: 2px 8px; border-radius: 10px;">0 itens</span>
        </h2>
        <div id="list-todo"></div>
    </section>

    <section id="section-cart">
        <h2 style="display: flex; justify-content: space-between;">
            <span>No Carrinho</span>
            <span id="count-cart" style="font-size: 0.75rem; background: var(--primary-color); color: white; padding: 2px 8px; border-radius: 10px;">0 itens</span>
        </h2>
        <div id="list-cart"></div>
    </section>

    <section id="section-history">
        <h2>Histórico por Mês</h2>
        <div class="month-pills" id="monthPillsContainer"></div>
        <div id="history-container"></div>
        
        <div class="monthly-summary" id="monthly-summary">
            <div style="display: flex; justify-content: space-between;">
                <span id="label-total-month">Total do Mês:</span>
                <b id="total-month">R$ 0,00</b>
            </div>
        </div>

        <div class="backup-controls">
            <button class="btn-cancel" id="btnBackup" style="font-size: 0.85rem; padding: 10px;">💾 Backup</button>
            <button class="btn-cancel" id="btnRestore" style="font-size: 0.85rem; padding: 10px;">🔄 Restaurar</button>
        </div>

        <div class="cta-retorno-container">
            <a href="index.html" class="cta-retorno-link">
                <span>💰 Economize mais: Veja os achadinhos e utilidades que separamos para você! ➔</span>
            </a>
        </div>

        <div style="text-align: center; padding: 16px 0;">
            <a href="privacidade.html" style="font-size: 10px; color: #555; text-decoration: underline; text-transform: uppercase;">
                Política de Privacidade
            </a>
        </div>
    </section>
</main>

<footer>
    <div class="totals">
        <div class="total-item">
            <span>Estimado</span>
            <b id="val-estimated">R$ 0,00</b>
        </div>
        <div class="total-item" style="text-align: right;">
            <span>No Carrinho</span>
            <b id="val-real">R$ 0,00</b>
        </div>
    </div>
    <button class="btn-finish" id="btnFinish">Finalizar Compra</button>
    <button id="btnResetApp" style="background: none; border: 1px solid var(--danger-color); color: var(--danger-color); border-radius: 8px; padding: 4px; font-size: 0.65rem; font-weight: bold; cursor: pointer; width: 100%; margin-top: 4px; opacity: 0.4;">RESET TOTAL DO APLICATIVO</button>
</footer>

<div class="modal-overlay" id="modalEdit">
    <div class="modal">
        <h3 id="editTitle" style="margin-top:0;">Editar Item</h3>
        <div class="form-row">
            <label>Tipo</label>
            <select id="editType"><option value="un">Unidade (un)</option><option value="kg">Peso (kg)</option></select>
        </div>
        <div class="form-row">
            <label>Quantidade</label>
            <input type="text" id="editQty">
        </div>
        <div class="form-row">
            <label>Preço (R$)</label>
            <input type="number" id="editPrice" step="0.01">
        </div>
        <div class="modal-btns">
            <button class="btn-cancel" id="btnCancelEdit">Cancelar</button>
            <button class="btn-save" id="btnSaveEdit">Salvar</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modalHistoryView">
    <div class="modal">
        <h3 id="historyViewTitle" style="margin-top:0;">Itens</h3>
        <div class="history-preview-list" id="historyViewList"></div>
        <div style="display: flex; justify-content: space-between; border-top: 1px dashed #444; padding-top:10px;">
            <span>Total:</span><b id="historyViewTotal">R$ 0,00</b>
        </div>
        <button class="btn-cancel" id="btnCloseHistoryView" style="width: 100%; margin-top:15px;">Fechar</button>
    </div>
</div>

<script>
    let state = { items: [], history: [], itemBank: {}, selectedMonthYear: "" };
    const STORAGE_KEY = 'smart_shopping_list_v6';
    const MONTH_NAMES = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

    async function init() {
        let saved = localStorage.getItem(STORAGE_KEY);
        if (saved) { try { state = JSON.parse(saved); } catch (e) {} }
        if (!state.selectedMonthYear) {
            const now = new Date();
            state.selectedMonthYear = `${String(now.getMonth() + 1).padStart(2, '0')}/${now.getFullYear()}`;
        }
        render();
        setupEventListeners();
        setupInstallation();
    }

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

    function addItem(name) {
        if (!name.trim()) return;
        const price = state.itemBank[name.toLowerCase()] || 0;
        state.items.push({ id: Date.now(), name: name.trim(), qty: 1, type: 'un', price: price, checked: false });
        save(); render();
    }

    function updateItem(id, updates) {
        const idx = state.items.findIndex(i => i.id === id);
        if (idx !== -1) {
            state.items[idx] = { ...state.items[idx], ...updates };
            if (updates.price !== undefined) state.itemBank[state.items[idx].name.toLowerCase()] = updates.price;
            save(); render();
        }
    }

    function toggleItem(id) {
        const item = state.items.find(i => i.id === id);
        if (item) { item.checked = !item.checked; if (item.checked) openEditModal(id); save(); render(); }
    }

    function deleteItem(id) { state.items = state.items.filter(i => i.id !== id); save(); render(); }

    function finishPurchase() {
        const realTotal = state.items.filter(i => i.checked).reduce((acc, i) => acc + (i.qty * i.price), 0);
        const checked = state.items.filter(i => i.checked);
        if (checked.length > 0) {
            state.history.unshift({ id: Date.now(), date: new Date().toLocaleDateString('pt-BR'), total: realTotal, items: checked });
            state.items = state.items.filter(i => !i.checked);
            save(); render(); alert('Compra salva!');
        }
    }

    function render() {
        const todo = document.getElementById('list-todo');
        const cart = document.getElementById('list-cart');
        todo.innerHTML = ''; cart.innerHTML = '';
        let tCount = 0, cCount = 0, est = 0, real = 0;

        state.items.forEach(item => {
            const sub = item.qty * item.price;
            const div = document.createElement('div');
            div.className = `list-item ${item.checked ? 'checked' : ''}`;
            div.innerHTML = `
                <div class="checkbox ${item.checked ? 'checked' : ''}" onclick="event.stopPropagation(); toggleItem(${item.id})"></div>
                <div class="item-info" onclick="openEditModal(${item.id})">
                    <span class="item-name">${item.name}</span>
                    <span class="item-details">${item.qty} ${item.type} x R$ ${item.price.toFixed(2)} = R$ ${sub.toFixed(2)}</span>
                </div>
                <button class="btn-icon" onclick="event.stopPropagation(); deleteItem(${item.id})">✕</button>
            `;
            if (item.checked) { cCount++; cart.appendChild(div); real += sub; } 
            else { tCount++; todo.appendChild(div); est += sub; }
        });

        document.getElementById('count-todo').innerText = `${tCount} itens`;
        document.getElementById('count-cart').innerText = `${cCount} itens`;
        document.getElementById('val-estimated').innerText = `R$ ${est.toFixed(2).replace('.', ',')}`;
        document.getElementById('val-real').innerText = `R$ ${real.toFixed(2).replace('.', ',')}`;

        // Histórico Simplificado
        const container = document.getElementById('history-container');
        container.innerHTML = '';
        let mTotal = 0;
        state.history.forEach(h => {
            mTotal += h.total;
            const d = document.createElement('div');
            d.className = 'history-item';
            d.innerHTML = `<span>📅 ${h.date}</span><b>R$ ${h.total.toFixed(2).replace('.', ',')}</b>`;
            d.onclick = () => openHistoryViewModal(h);
            container.appendChild(d);
        });
        document.getElementById('total-month').innerText = `R$ ${mTotal.toFixed(2).replace('.', ',')}`;
    }

    let editId = null;
    function openEditModal(id) {
        editId = id; const item = state.items.find(i => i.id === id); if (!item) return;
        document.getElementById('editType').value = item.type;
        document.getElementById('editQty').value = item.qty;
        document.getElementById('editPrice').value = item.price || '';
        document.getElementById('modalEdit').style.display = 'flex';
    }

    function openHistoryViewModal(h) {
        document.getElementById('historyViewTitle').innerText = `Compra ${h.date}`;
        document.getElementById('historyViewTotal').innerText = `R$ ${h.total.toFixed(2)}`;
        const list = document.getElementById('historyViewList'); list.innerHTML = '';
        if(h.items) {
            h.items.forEach(i => {
                const r = document.createElement('div'); r.className = 'history-preview-row';
                r.innerHTML = `<span>${i.name} (${i.qty}${i.type})</span><b>R$ ${(i.qty*i.price).toFixed(2)}</b>`;
                list.appendChild(r);
            });
        }
        document.getElementById('modalHistoryView').style.display = 'flex';
    }

    let defPrompt;
    function setupInstallation() {
        const btn = document.getElementById('installApp');
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); defPrompt = e; btn.style.display = 'block'; });
        btn.onclick = async () => { if (defPrompt) { defPrompt.prompt(); const { outcome } = await defPrompt.userChoice; if (outcome === 'accepted') btn.style.display = 'none'; defPrompt = null; } };
    }

    function setupEventListeners() {
        const input = document.getElementById('itemInput');
        document.getElementById('btnAdd').onclick = () => { addItem(input.value); input.value = ''; };
        input.onkeyup = (e) => { if (e.key === 'Enter') { addItem(input.value); input.value = ''; } };
        document.getElementById('btnCancelEdit').onclick = () => document.getElementById('modalEdit').style.display = 'none';
        document.getElementById('btnSaveEdit').onclick = () => {
            updateItem(editId, { type: document.getElementById('editType').value, qty: parseFloat(document.getElementById('editQty').value)||1, price: parseFloat(document.getElementById('editPrice').value)||0 });
            document.getElementById('modalEdit').style.display = 'none';
        };
        document.getElementById('btnFinish').onclick = finishPurchase;
        document.getElementById('btnCloseHistoryView').onclick = () => document.getElementById('modalHistoryView').style.display = 'none';
        document.getElementById('btnBackup').onclick = () => {
            const blob = new Blob([JSON.stringify(state)], { type: "text/plain" });
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `backup.txt`; a.click();
        };
        document.getElementById('btnRestore').onclick = () => {
            const i = document.createElement('input'); i.type = 'file';
            i.onchange = e => {
                const r = new FileReader(); r.onload = ev => { try { state = JSON.parse(ev.target.result); save(); render(); alert("Restaurado!"); } catch(ex){} };
                r.readAsText(e.target.files[0]);
            };
            i.click();
        };
        document.getElementById('btnResetApp').onclick = () => { if(confirm("Resetar?") && confirm("Certeza?")) { localStorage.clear(); location.reload(); } };
    }

    init();
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js').catch(err => console.log(err)); }
</script>
</body>
</html>
